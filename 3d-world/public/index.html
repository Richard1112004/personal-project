<html lang="en">
<head>

    <title>3D Fondi Lobby</title>

</head>

                "three/examples/jsm/controls/PointerLockControls.js": "https://unpkg.com/three@0.128.0/examples/jsm/controls/PointerLockControls.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
    <script type="module" src="../src/client/main.js"></script>

</html>
