<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Fondi Lobby - PUBG Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0c10; font-family: sans-serif; }
        
        #blocker {
            position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        #instructions {
            text-align: center; color: #66fcf1; cursor: pointer;
            font-size: 24px; text-shadow: 0 0 10px #66fcf1;
            border: 2px solid #66fcf1; padding: 20px 40px; border-radius: 10px;
        }
        #instructions span { font-size: 16px; color: #c5c6c7; display: block; margin-top: 10px; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: #fff; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            CLICK TO PLAY
            <span>W, A, S, D to move | Mouse to look | ESC to pause</span>
        </div>
    </div>
    <div id="interactionPrompt" style="display: none; position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.8); padding: 15px 30px; font-family: sans-serif; font-size: 24px; font-weight: bold; border-radius: 8px; z-index: 100; pointer-events: none; border: 2px solid white; text-align: center;">
        Press E to enter
    </div>
    <button id="enterCafeBtn" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-size: 20px; font-weight: bold; background-color: #66fcf1; border: none; border-radius: 10px; cursor: pointer; z-index: 100;">
        Enter Cafe
    </button>
    <!-- <div id="crosshair"></div>  -->
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/examples/jsm/controls/PointerLockControls.js": "https://unpkg.com/three@0.128.0/examples/jsm/controls/PointerLockControls.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>

    <script type="module" src="3d-script.js"></script>
</body>
</html>
