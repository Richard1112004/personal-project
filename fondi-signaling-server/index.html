<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fondi Web Clone - Phase 1</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #log { background: #000; color: #0f0; padding: 10px; height: 200px; overflow-y: scroll; font-family: monospace; }
        .room-controls { margin-bottom: 20px; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Fondi Web Lobby (Phase 1)</h2>
    <div style="margin-top: 20px;">
        <div>
            <strong>Your Mic:</strong>
            <div style="width: 200px; height: 20px; background: #ddd; border-radius: 10px;">
                <div id="localVolumeBar" style="width: 0%; height: 100%; background: #28a745; border-radius: 10px; transition: width 0.1s;"></div>
            </div>
        </div>
        
        <div style="margin-top: 10px;">
            <strong>Remote Voice:</strong>
            <div style="width: 200px; height: 20px; background: #ddd; border-radius: 10px;">
                <div id="remoteVolumeBar" style="width: 0%; height: 100%; background: #007bff; border-radius: 10px; transition: width 0.1s;"></div>
            </div>
        </div>
    </div>
    <audio id="remoteAudio" autoplay></audio>
    <div class="room-controls">
        <input type="text" id="roomIdInput" placeholder="Enter Room Name">
        <button id="joinBtn" onclick="joinRoom()">Join Room</button>
        
        <button id="leaveBtn" onclick="leaveRoom()" style="display: none; background: #6c757d;">Leave Room</button>
        <button id="muteBtn" onclick="toggleMute()" style="display: none; background: #dc3545;">Mute Mic</button>
    </div>

    <h4>Connection Log:</h4>
    <div id="log"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
